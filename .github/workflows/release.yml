name: Release Binaries

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claudash-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: claudash-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: claudash-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: claudash-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: claudash-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: claudash-windows-arm64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/claudash ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/claudash.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  upload:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -name 'claudash-*' -exec cp {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: release/*
